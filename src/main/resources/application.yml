spring.application:
  name: product-api

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/product_db
    driverClassName: org.postgresql.Driver
    userName: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect